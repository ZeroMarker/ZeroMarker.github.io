<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Zeromark 的常用小工具集合，包含单词记忆、数字游戏和 SIM 卡保号信息。" />
    <meta name="theme-color" content="#0f172a" />
    <title>我的工具箱 | Zeromark Apps</title>

    <script>
        try {
            const storedTheme = localStorage.getItem('theme');
            const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            document.documentElement.dataset.theme = storedTheme || (prefersLight ? 'light' : 'dark');
        } catch {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <button class="theme-toggle" type="button" aria-label="切换为浅色主题" title="切换主题">
        <span aria-hidden="true">🌙</span>
    </button>

    <main class="page-shell">
        <header class="hero">
            <p class="eyebrow">Zeromark Apps</p>
            <h1>我的工具箱</h1>
            <p class="subtitle">常用小工具集合，随时打开就能用。</p>
        </header>

        <section class="apps-grid" aria-label="工具列表">
            <a href="word/index.html" class="card" style="--card-accent: #22c55e">
                <span class="card-icon" aria-hidden="true">📚</span>
                <span class="card-body">
                    <span class="card-title">Word List</span>
                    <span class="card-description">英语单词记忆工具，支持导入导出和复习计划。</span>
                </span>
            </a>

            <a href="6561/index.html" class="card" style="--card-accent: #f59e0b">
                <span class="card-icon" aria-hidden="true">🔢</span>
                <span class="card-body">
                    <span class="card-title">6561</span>
                    <span class="card-description">2048 变种数字游戏，适合碎片时间练手。</span>
                </span>
            </a>

            <a href="docs/sim/index.html" class="card" style="--card-accent: #38bdf8">
                <span class="card-icon" aria-hidden="true">🛠️</span>
                <span class="card-body">
                    <span class="card-title">SIM 卡</span>
                    <span class="card-description">整理 SIM 卡保号相关信息，方便快速查阅。</span>
                </span>
            </a>

            <a href="tool/split.html" class="card" style="--card-accent: #f97316">
                <span class="card-icon" aria-hidden="true">✂️</span>
                <span class="card-body">
                    <span class="card-title">图片分割</span>
                    <span class="card-description">在线图片分割工具，自定义行列数和分割线粗细，一键打包下载。</span>
                </span>
            </a>
        </section>
    </main>

    <footer class="site-footer">
        © 2026 Zeromark
    </footer>

    <script>
        const toggle = document.querySelector('.theme-toggle');
        const icon = toggle.querySelector('span');
        const root = document.documentElement;
        const themeColor = document.querySelector('meta[name="theme-color"]');

        function syncThemeButton() {
            const isLight = root.dataset.theme === 'light';
            icon.textContent = isLight ? '☀️' : '🌙';
            toggle.setAttribute('aria-label', isLight ? '切换为深色主题' : '切换为浅色主题');
            themeColor.setAttribute('content', isLight ? '#f6f7fb' : '#101521');
        }

        toggle.addEventListener('click', () => {
            root.dataset.theme = root.dataset.theme === 'light' ? 'dark' : 'light';
            try {
                localStorage.setItem('theme', root.dataset.theme);
            } catch {}
            syncThemeButton();
        });

        syncThemeButton();
    </script>
</body>
</html>
