<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Rocket app icon">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="0.48" stop-color="#2563eb"/>
      <stop offset="0.78" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="nebula-purple" cx="20%" cy="25%" r="40%">
      <stop stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-blue" cx="78%" cy="80%" r="35%">
      <stop stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-green" cx="60%" cy="18%" r="25%">
      <stop stop-color="#22c55e" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocket-body" x1="190" y1="86" x2="322" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="rocket-shade" x1="256" y1="62" x2="256" y2="349" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="fin-left" x1="179" y1="220" x2="120" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="fin-right" x1="333" y1="220" x2="392" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="256" y1="348" x2="256" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.12" stop-color="#fef08a"/>
      <stop offset="0.35" stop-color="#f97316"/>
      <stop offset="0.6" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#991b1b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame-glow" x1="256" y1="340" x2="256" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#991b1b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="window-glass" x1="240" y1="160" x2="272" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 圆角深空背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 星云光晕 -->
  <rect width="512" height="512" rx="112" fill="url(#nebula-purple)"/>
  <rect width="512" height="512" rx="112" fill="url(#nebula-blue)"/>
  <rect width="512" height="512" rx="112" fill="url(#nebula-green)"/>

  <!-- 装饰光晕（行星/星云） -->
  <circle cx="392" cy="112" r="72" fill="#38bdf8" opacity="0.18"/>
  <circle cx="118" cy="394" r="88" fill="#22c55e" opacity="0.13"/>
  <circle cx="60" cy="100" r="40" fill="#a78bfa" opacity="0.1"/>
  <circle cx="460" cy="420" r="50" fill="#38bdf8" opacity="0.08"/>

  <!-- 星星 - 大颗 -->
  <circle cx="85" cy="65" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="420" cy="60" r="3" fill="#ffffff" opacity="0.85"/>
  <circle cx="450" cy="180" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="55" cy="240" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="380" r="2" fill="#ffffff" opacity="0.75"/>
  <circle cx="440" cy="310" r="2.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="470" cy="450" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="50" cy="450" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="400" cy="470" r="3" fill="#ffffff" opacity="0.75"/>
  <circle cx="130" cy="120" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="370" cy="150" r="1.5" fill="#ffffff" opacity="0.65"/>
  <circle cx="160" cy="50" r="1.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="350" cy="80" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="160" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="480" cy="260" r="1.8" fill="#ffffff" opacity="0.65"/>

  <!-- 星星 - 小颗 -->
  <circle cx="140" cy="85" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="290" cy="45" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="380" cy="50" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="60" cy="150" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="40" cy="310" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="150" cy="440" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="300" cy="480" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="480" cy="130" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="45" cy="50" r="1" fill="#ffffff" opacity="0.45"/>
  <circle cx="460" cy="360" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="30" r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="320" cy="35" r="1" fill="#ffffff" opacity="0.45"/>
  <circle cx="70" cy="280" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="430" cy="420" r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="30" cy="190" r="0.6" fill="#ffffff" opacity="0.3"/>
  <circle cx="500" cy="90" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="490" cy="460" r="0.6" fill="#ffffff" opacity="0.3"/>
  <circle cx="30" cy="420" r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="54" cy="330" r="0.6" fill="#ffffff" opacity="0.3"/>

  <!-- 闪烁星星（十字星芒） -->
  <g transform="translate(420, 60)" opacity="0.7">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#ffffff" stroke-width="0.8"/>
  </g>
  <g transform="translate(85, 65)" opacity="0.6">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#ffffff" stroke-width="0.6"/>
  </g>
  <g transform="translate(440, 310)" opacity="0.5">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#ffffff" stroke-width="0.6"/>
  </g>

  <!-- 火箭阴影 -->
  <path d="M256 70c57 30 93 91 93 158 0 44-16 89-43 129H206c-27-40-43-85-43-129 0-67 36-128 93-158Z" fill="#020617" opacity="0.22"/>

  <!-- 火箭主体 -->
  <path d="M256 62c57 30 93 91 93 158 0 44-16 89-43 129H206c-27-40-43-85-43-129 0-67 36-128 93-158Z" fill="url(#rocket-body)"/>

  <!-- 主体底部暗面 -->
  <path d="M256 62c57 30 93 91 93 158 0 44-16 89-43 129H206c-27-40-43-85-43-129 0-67 36-128 93-158Z" fill="url(#rocket-shade)"/>

  <!-- 机身装饰线 -->
  <path d="M256 110v230" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>
  <path d="M230 140v180" stroke="#93c5fd" stroke-width="0.8" stroke-opacity="0.15" fill="none"/>
  <path d="M282 140v180" stroke="#93c5fd" stroke-width="0.8" stroke-opacity="0.15" fill="none"/>

  <!-- 左侧尾翼 (swept-back design) -->
  <path d="M185 255c-36 24-60 68-65 112-1 14 14 22 24 13l72-56-31-69Z" fill="url(#fin-left)"/>
  <path d="M185 255c-20 14-36 36-46 60" stroke="#93c5fd" stroke-width="2" stroke-opacity="0.4" fill="none"/>

  <!-- 右侧尾翼 -->
  <path d="M327 255c36 24 60 68 65 112 1 14-14 22-24 13l-72-56 31-69Z" fill="url(#fin-right)"/>
  <path d="M327 255c20 14 36 36 46 60" stroke="#93c5fd" stroke-width="2" stroke-opacity="0.4" fill="none"/>

  <!-- 舷窗外圈 -->
  <circle cx="256" cy="178" r="48" fill="#1d4ed8"/>
  <circle cx="256" cy="178" r="44" fill="#2563eb" opacity="0.4"/>
  
  <!-- 舷窗内圈 -->
  <circle cx="256" cy="178" r="34" fill="#38bdf8"/>
  
  <!-- 舷窗玻璃反光 -->
  <path d="M232 158c-8 8-14 20-14 32 0 6 1 12 4 18l42-42c-10-6-21-10-32-10v2Z" fill="url(#window-glass)"/>
  <circle cx="246" cy="166" r="11" fill="#e0f2fe"/>

  <!-- 尾喷管 -->
  <path d="M206 349h100c-13 23-30 42-50 56-20-14-37-33-50-56Z" fill="#c7d2fe"/>
  <rect x="218" y="355" width="76" height="4" rx="2" fill="#a5b4fc" opacity="0.5"/>
  <rect x="222" y="362" width="68" height="3" rx="1.5" fill="#a5b4fc" opacity="0.3"/>

  <!-- 外部火焰光晕 -->
  <path d="M210 352h92l-28 68c-10 25-22 48-36 68-14-20-26-43-36-68l-28-68Z" fill="url(#flame-glow)"/>

  <!-- 主火焰 -->
  <path d="M215 356h82l-18 51c-6 19-14 36-23 51-9-15-17-32-23-51l-18-51Z" fill="url(#flame-inner)"/>

  <!-- 火焰火花 -->
  <circle cx="238" cy="422" r="4.5" fill="#fde047" opacity="0.8"/>
  <circle cx="268" cy="438" r="3.5" fill="#f97316" opacity="0.7"/>
  <circle cx="246" cy="448" r="2.5" fill="#ef4444" opacity="0.6"/>
  <circle cx="262" cy="412" r="3" fill="#fef08a" opacity="0.7"/>
  <circle cx="252" cy="436" r="2" fill="#fde047" opacity="0.5"/>

  <!-- 鼻锥高光 -->
  <path d="M256 62c18 10 34 23 48 39h-96c14-16 30-29 48-39Z" fill="#ffffff"/>

  <!-- 鼻锥顶部分割线 -->
  <ellipse cx="256" cy="72" rx="6" ry="3" fill="#ffffff" opacity="0.4"/>
</svg>
